<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Bharat School - Bot Control Center</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app-container">
    <!-- Sidebar for Sessions List -->
    <aside class="sidebar">
      <div class="sidebar-header">
        <div class="brand">
          <div class="logo-dot"></div>
          <h2>The Bharat School</h2>
        </div>
        <p class="subtitle">Bot Control Dashboard</p>
      </div>
      <div class="sessions-list" id="sessionsList">
        <!-- Rendered dynamically by app.js -->
        <div class="loading-placeholder">Loading sessions...</div>
      </div>
    </aside>

    <!-- Main Chat & Control Area -->
    <main class="chat-area">
      <!-- Chat Header containing controls -->
      <header class="chat-header" id="chatHeader">
        <div class="chat-info">
          <h3 id="activePhone">Select a chat to begin</h3>
          <div class="status-badge" id="aiStatusBadge" style="display: none;">
            <span class="status-dot"></span>
            <span class="status-text">Checking...</span>
          </div>
        </div>
        
        <!-- Controls Panel -->
        <div class="controls-panel" id="controlsPanel" style="display: none;">
          <!-- AI Enable/Disable Toggle -->
          <div class="toggle-container">
            <span class="toggle-label">AI Responder</span>
            <label class="switch">
              <input type="checkbox" id="aiToggleCheckbox">
              <span class="slider round"></span>
            </label>
          </div>
          
          <!-- Pause Timers -->
          <div class="pause-controls">
            <span class="control-label">Pause AI:</span>
            <button class="btn btn-pause" data-time="5">5m</button>
            <button class="btn btn-pause" data-time="15">15m</button>
            <button class="btn btn-pause" data-time="60">1h</button>
          </div>

          <!-- Resume Button -->
          <button class="btn btn-resume" id="btnResume" style="display: none;">Resume AI</button>
          
          <!-- Delete Button -->
          <button class="btn btn-delete" id="btnDeleteChat" style="display: none; background: #e74c3c; margin-left: 10px;">Delete Chat</button>

          <!-- Select Mode Button -->
          <button class="btn btn-select-mode" id="btnSelectMode" style="display: none; margin-left: 10px; background: #58a6ff; color: white;">Select Messages</button>
        </div>
      </header>

      <!-- Selection Action Bar -->
      <div class="selection-action-bar" id="selectionActionBar" style="display: none;">
        <span id="selectionCount">0 selected</span>
        <div class="action-buttons">
          <button class="btn btn-cancel-selection" id="btnCancelSelection">Cancel</button>
          <button class="btn btn-delete-selected" id="btnDeleteSelected">Delete Selected</button>
        </div>
      </div>

      <!-- Message History Container -->
      <section class="messages-container" id="messagesContainer">
        <div class="empty-state">
          <div class="empty-icon">🤖</div>
          <h3>Welcome to the Control Center</h3>
          <p>Select a phone number from the sidebar to view message logs, take over chats, or manage automated replies.</p>
        </div>
      </section>

      <!-- Input Form -->
      <footer class="chat-input-area" id="chatInputArea" style="display: none;">
        <form id="messageForm" class="message-form">
          <input type="text" id="messageInput" placeholder="Type a message to reply manually... (AI will pause for 5m)" required autocomplete="off">
          <button type="submit" class="btn btn-send">
            <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round" class="send-icon"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
          </button>
        </form>
      </footer>
    </main>
  </div>

  <script src="app.js"></script>
</body>
</html>
